version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: medrelief_dev
      POSTGRES_USER: medrelief
      POSTGRES_PASSWORD: medrelief_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medrelief"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
