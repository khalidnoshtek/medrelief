name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps (fresh, no cache due to rollup optional deps issue)
        run: |
          rm -rf node_modules packages/*/node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Build frontend-v2 PWA
        run: npm run build --workspace=@medrelief/frontend-v2
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_BASE_PATH: /medrelief/app/

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r website/* _site/
          mkdir -p _site/app
          cp -r packages/frontend-v2/dist/* _site/app/

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
